<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agave Flip">
<meta name="theme-color" content="#1C1C1A">
<title>Agave Co — Flip Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --sand: #F2EDE4; --clay: #C4875A; --agave: #4A7C6F;
    --dark: #1C1C1A; --darker: #141412; --mid: #6B6B5E;
    --accent: #E05C2A; --border: #2E2E2A;
  }
  html, body { height: 100%; background: var(--dark); color: var(--sand); font-family: 'DM Sans', sans-serif; overscroll-behavior: none; }
  body { padding: 20px 16px 40px; min-height: 100vh; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 14px; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
  .logo-wrap { display: flex; align-items: baseline; gap: 10px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--clay); letter-spacing: 2px; line-height: 1; }
  .version { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--mid); letter-spacing: 1px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--agave); box-shadow: 0 0 6px var(--agave); }

  .card { background: #222220; border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
  label { display: block; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--clay); margin-bottom: 8px; }
  input, textarea { width: 100%; background: var(--darker); border: 1px solid var(--border); border-radius: 8px; color: var(--sand); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 12px 14px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; appearance: none; }
  input { margin-bottom: 16px; }
  input:focus, textarea:focus { border-color: var(--clay); }
  textarea { resize: none; height: 80px; font-size: 14px; line-height: 1.5; }
  .hint { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--mid); letter-spacing: 0.5px; margin-top: 8px; }

  .btn { width: 100%; background: var(--clay); color: var(--darker); border: none; border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; padding: 16px; cursor: pointer; margin-top: 16px; transition: background 0.15s; -webkit-appearance: none; }
  .btn:active { background: var(--accent); }
  .btn:disabled { background: #333; color: #555; }

  .loading { display: none; text-align: center; padding: 50px 20px; }
  .loading.visible { display: block; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--clay); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--clay); letter-spacing: 1px; }
  .loading-sub { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--mid); margin-top: 6px; }

  .output { display: none; }
  .output.visible { display: block; }
  .report-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 10px; }
  .report-title { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 2px; color: var(--clay); }
  .report-address { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--mid); margin-top: 2px; }
  .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--mid); font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1px; padding: 8px 14px; border-radius: 6px; cursor: pointer; white-space: nowrap; flex-shrink: 0; -webkit-appearance: none; }
  .copy-btn:active { border-color: var(--clay); color: var(--clay); }
  .report-text { font-family: 'DM Sans', sans-serif; font-size: 13px; line-height: 1.8; color: var(--sand); white-space: pre-wrap; word-break: break-word; }
  .new-btn { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--mid); border-radius: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; padding: 14px; cursor: pointer; margin-top: 16px; -webkit-appearance: none; }
  .new-btn:active { border-color: var(--clay); color: var(--clay); }

  .error { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); padding: 10px 0 0; display: none; }
  .error.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <div class="logo">AGAVE CO</div>
    <div class="version">FLIP ANALYZER</div>
  </div>
  <div class="status-dot"></div>
</div>

<div id="inputSection">
  <div class="card">
    <label>Property Address</label>
    <input type="text" id="address" placeholder="39195 N Taylor St, Queen Creek AZ" autocomplete="off" autocorrect="off" spellcheck="false" />
    <label>Field Notes (optional)</label>
    <textarea id="notes" placeholder="What you saw — vacant, good bones, big lot, well/septic, horse setup..."></textarea>
    <div class="hint">Drop the address. Everything else gets pulled automatically.</div>
    <button class="btn" id="analyzeBtn" onclick="analyze()">ANALYZE THIS FLIP</button>
    <div class="error" id="errorMsg"></div>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">PULLING PROPERTY DATA</div>
  <div class="loading-sub">Searching records, comps, and market data...</div>
</div>

<div class="output" id="output">
  <div class="card">
    <div class="report-header">
      <div>
        <div class="report-title">FLIP REPORT</div>
        <div class="report-address" id="reportAddress"></div>
      </div>
      <button class="copy-btn" onclick="copyReport()">COPY</button>
    </div>
    <div class="report-text" id="reportText"></div>
  </div>
  <button class="new-btn" onclick="reset()">NEW PROPERTY</button>
</div>

<script>
async function analyze() {
  const address = document.getElementById('address').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const errorEl = document.getElementById('errorMsg');
  errorEl.classList.remove('visible');

  if (!address) {
    errorEl.textContent = 'Enter an address first.';
    errorEl.classList.add('visible');
    return;
  }

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('loading').classList.add('visible');

  const prompt = `You are a sharp real estate investor analyst helping KO (Kyle Olsen), an experienced Arizona contractor and entrepreneur, evaluate potential flip properties in the Phoenix East Valley / Queen Creek / San Tan Valley market.

KO spots properties in the field. He gives you the address. You look everything up and build the full report.

ADDRESS: ${address}
FIELD NOTES FROM KO: ${notes || 'None'}

Search for this property. Look it up on Zillow, Redfin, county assessor (Maricopa or Pinal depending on location). Pull: owner name if available, lot size, sq footage, year built, beds/baths, last sale price and date, current Zestimate, zoning.

Produce a clean FLIP REPORT. No markdown. No ## symbols. Use the numbered section names exactly as written. Keep it tight — forwarded directly to an investor.

1. PROPERTY SNAPSHOT
All facts: address, type, sq ft, lot/acreage, year built, beds/baths, zoning, owner if findable, last sale price + date, current estimated value.

2. THE LAND PLAY
Is the acreage the real value? Split potential, development, horse property premium, STR angle, other upside?

3. COMPS
3-4 actual comparable properties sold nearby in last 12-18 months. For each: address, sq ft, lot size, sale price, sale date. If live comps unavailable, describe what market data supports.

4. ARV ESTIMATE
Low / Mid / High after-repair value. Specific dollar amounts. Acreage premium if applicable.

5. FLIP NUMBERS
Target offer price. Light / medium / heavy rehab: estimated cost and projected profit at each level.

6. RED FLAGS
What could kill this deal? Well/septic? Roof/HVAC age? Liens? Flood zone? What must KO verify before committing?

7. INVESTOR VERDICT
One sentence: Pass, Maybe, or Pull the Trigger — and the single most important reason.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const fullText = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
    if (!fullText) throw new Error('Empty');

    document.getElementById('reportAddress').textContent = address;
    document.getElementById('reportText').textContent = fullText;
    document.getElementById('output').classList.add('visible');
  } catch(err) {
    document.getElementById('inputSection').style.display = 'block';
    errorEl.textContent = 'Something went wrong. Check connection and try again.';
    errorEl.classList.add('visible');
    document.getElementById('analyzeBtn').disabled = false;
  }

  document.getElementById('loading').classList.remove('visible');
}

function copyReport() {
  const address = document.getElementById('address').value.trim();
  const report = document.getElementById('reportText').textContent;
  const full = `FLIP REPORT — ${address}\n\n${report}`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(full).then(() => flash()).catch(() => fallbackCopy(full));
  } else { fallbackCopy(full); }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta); flash();
}

function flash() {
  const btn = document.querySelector('.copy-btn');
  btn.textContent = 'COPIED ✓';
  setTimeout(() => btn.textContent = 'COPY', 2000);
}

function reset() {
  document.getElementById('address').value = '';
  document.getElementById('notes').value = '';
  document.getElementById('output').classList.remove('visible');
  document.getElementById('inputSection').style.display = 'block';
  document.getElementById('analyzeBtn').disabled = false;
  document.getElementById('errorMsg').classList.remove('visible');
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
